name: Add best tournament records

on:
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: add-best-tournament-records
  cancel-in-progress: false

jobs:
  install:
    name: Add tournament gain records
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Patch records and sort options
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path


          BUILD_PATH = Path("scripts/build_site.py")
          APP_PATH = Path("public/assets/app.js")
          TEST_PATH = Path("tests/test_build.py")


          def replace_once(
              text: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              count = text.count(old)

              if count == 0 and new in text:
                  print(f"{description} is already installed.")
                  return text

              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )

              return text.replace(old, new, 1)


          BEST_TOURNAMENT_BUILD = r'''
          def tournament_rating_at_snapshot(
              history: list[dict[str, Any]],
              snapshot: str,
          ) -> dict[str, Any] | None:
              # Return the published rating used by tournament snapshot pages.
              point = None
              for candidate in history:
                  if candidate["date"] > snapshot:
                      break
                  point = candidate

              if point is None or point["matches"] < 30:
                  return None

              snapshot_year = int(snapshot[:4])
              last_match_year = int(point["date"][:4])
              if snapshot_year - last_match_year > 4:
                  return None

              return point


          def build_best_tournament_records(
              tournament_catalog: dict[str, Any],
              team_pages: dict[str, dict[str, Any]],
          ) -> list[dict[str, Any]]:
              # Rank positive rating gains across complete tournament editions.
              records: list[dict[str, Any]] = []

              for family in tournament_catalog["families"]:
                  for edition in family["editions"]:
                      participant_names = {
                          participant["code"]: participant["nation"]
                          for participant in edition.get("participants", [])
                      }

                      for code in edition["teams"]:
                          page = team_pages.get(code)
                          if page is None:
                              continue

                          history = page.get("history", [])
                          before = tournament_rating_at_snapshot(
                              history,
                              edition["before"],
                          )
                          after = tournament_rating_at_snapshot(
                              history,
                              edition["after"],
                          )
                          if before is None or after is None:
                              continue

                          gain = after["rating"] - before["rating"]
                          if gain <= 0:
                              continue

                          records.append({
                              "code": code,
                              "nation": (
                                  participant_names.get(code)
                                  or after.get("historical_name")
                                  or after.get("nation")
                                  or code
                              ),
                              "tournament": family["name"],
                              "tournament_id": family["id"],
                              "category": family["category"],
                              "edition": edition["label"],
                              "edition_id": edition["id"],
                              "start": edition["start"],
                              "end": edition["end"],
                              "before": edition["before"],
                              "after": edition["after"],
                              "before_rating": before["rating"],
                              "after_rating": after["rating"],
                              "rating_gain": gain,
                          })

              records.sort(key=lambda row: (
                  -row["rating_gain"],
                  row["after"],
                  row["tournament"],
                  row["nation"],
              ))
              return records
          '''


          build = BUILD_PATH.read_text(encoding="utf-8")

          if "def build_best_tournament_records(" not in build:
              marker = "def build_historical_rankings("
              position = build.find(marker)
              if position < 0:
                  raise RuntimeError(
                      "Could not find build_historical_rankings insertion point"
                  )
              build = (
                  build[:position]
                  + BEST_TOURNAMENT_BUILD.rstrip()
                  + "\n\n"
                  + build[position:]
              )

          old_catalog_write = '''    write_json(data / "rankings-history" / "index.json", {
                  "first": first_date,
                  "last": last_date,
                  "years": years,
              })
              write_json(
                  data / "tournaments" / "index.json",
                  build_tournament_catalog(output.matches),
              )
          '''

          new_catalog_write = '''    tournament_catalog = build_tournament_catalog(output.matches)
              output.summary["best_tournaments"] = build_best_tournament_records(
                  tournament_catalog,
                  output.team_pages,
              )

              write_json(data / "rankings-history" / "index.json", {
                  "first": first_date,
                  "last": last_date,
                  "years": years,
              })
              write_json(
                  data / "tournaments" / "index.json",
                  tournament_catalog,
              )
          '''

          build = replace_once(
              build,
              old_catalog_write,
              new_catalog_write,
              "tournament catalog summary integration",
          )

          BUILD_PATH.write_text(
              build.rstrip() + "\n",
              encoding="utf-8",
          )


          BEST_TOURNAMENT_TABLE = r'''
            function bestTournamentTable(rows) {
              if (!rows.length) {
                return `<div class="empty"><h2>No tournament gains</h2><p>No comparable positive tournament rating gains are available.</p></div>`;
              }

              return `<div class="table-hint" aria-hidden="true">Swipe to see every column →</div><div class="table-shell"><table>
                <thead><tr><th class="numeric">Rank</th><th>Nation</th><th>Tournament</th><th class="hide-mobile">Edition</th><th class="numeric">Rating gain</th><th class="numeric">Rating before → after</th><th class="hide-mobile">Tournament ended</th></tr></thead>
                <tbody>${rows.map((row, index) => {
                  const tournamentURL = `#/tournaments?tournament=${encodeURIComponent(row.tournament_id)}&edition=${encodeURIComponent(row.edition_id)}&view=after`;
                  return `<tr>
                    <td class="rank-cell numeric">${index + 1}</td>
                    <td>${teamLink(row.code, row.nation, row.after)}</td>
                    <td><a class="team-link" href="${tournamentURL}">${escapeHTML(row.tournament)}</a></td>
                    <td class="hide-mobile">${escapeHTML(row.edition)}</td>
                    <td class="numeric"><span class="rating-main movement-up">+${rating(row.rating_gain)}</span></td>
                    <td class="numeric"><span class="rating-pair">${rating(row.before_rating)} → ${rating(row.after_rating)}</span></td>
                    <td class="hide-mobile">${validDate(row.after)}</td>
                  </tr>`;
                }).join("")}</tbody>
              </table></div>`;
            }
          '''


          app = APP_PATH.read_text(encoding="utf-8")

          if "function bestTournamentTable(rows)" not in app:
              marker = "  function renderRecords(route) {"
              position = app.find(marker)
              if position < 0:
                  raise RuntimeError(
                      "Could not find renderRecords insertion point"
                  )
              app = (
                  app[:position]
                  + BEST_TOURNAMENT_TABLE.rstrip()
                  + "\n\n"
                  + app[position:]
              )

          old_tabs = '''        <div class="record-tabs"><button class="button button-dark" data-record="peaks" aria-pressed="true">Nation peaks</button><button class="button" data-record="numberones" aria-pressed="false">No. 1 chronology</button><button class="button" data-record="numberonesummary" aria-pressed="false">No. 1 summary</button><button class="button" data-record="matches" aria-pressed="false">Top matches</button><button class="button" data-record="upsets" aria-pressed="false">Largest upsets</button></div>
          '''

          new_tabs = '''        <div class="record-tabs"><button class="button button-dark" data-record="peaks" aria-pressed="true">Nation peaks</button><button class="button" data-record="numberones" aria-pressed="false">No. 1 chronology</button><button class="button" data-record="numberonesummary" aria-pressed="false">No. 1 summary</button><button class="button" data-record="matches" aria-pressed="false">Top matches</button><button class="button" data-record="upsets" aria-pressed="false">Largest upsets</button><button class="button" data-record="tournaments" aria-pressed="false">Best tournaments</button></div>
          '''

          app = replace_once(
              app,
              old_tabs,
              new_tabs,
              "Best tournaments record tab",
          )

          app = replace_once(
              app,
              '''    let view = ["peaks", "numberones", "numberonesummary", "matches", "upsets"].includes(route.query.get("view")) ? route.query.get("view") : "peaks";
          ''',
              '''    let view = ["peaks", "numberones", "numberonesummary", "matches", "upsets", "tournaments"].includes(route.query.get("view")) ? route.query.get("view") : "peaks";
          ''',
              "Best tournaments record route",
          )

          app = replace_once(
              app,
              '''        matches: summary.top_matches,
                  upsets: summary.upsets,
          ''',
              '''        matches: summary.top_matches,
                  upsets: summary.upsets,
                  tournaments: summary.best_tournaments || [],
          ''',
              "Best tournaments record source",
          )

          old_note_tail = '''            : view === "matches"
                      ? `<strong>Q</strong><div><b>Every eligible match instance is ranked.</b> Q is the two breadth-adjusted means minus 1.645 times their joint standard error; repeat pairings are not deduplicated.</div>`
                      : `<strong>±</strong><div><b>Decisive results ranked by rating movement.</b> Upset points are the average of the winner's rating gain and the loser's rating loss. The two values can differ because this network-adjusted model is not strictly zero-sum.</div>`;
          '''

          new_note_tail = '''            : view === "matches"
                      ? `<strong>Q</strong><div><b>Every eligible match instance is ranked.</b> Q is the two breadth-adjusted means minus 1.645 times their joint standard error; repeat pairings are not deduplicated.</div>`
                      : view === "upsets"
                        ? `<strong>±</strong><div><b>Decisive results ranked by rating movement.</b> Upset points are the average of the winner's rating gain and the loser's rating loss. The two values can differ because this network-adjusted model is not strictly zero-sum.</div>`
                        : `<strong>▲</strong><div><b>Largest positive rating gains over one tournament edition.</b> Each row compares the same published before-and-after snapshots used on the Tournaments page. Teams without a comparable published rating at both snapshots are excluded.</div>`;
          '''

          app = replace_once(
              app,
              old_note_tail,
              new_note_tail,
              "Best tournaments record explanation",
          )

          table_start = (
              '      document.getElementById("record-table").innerHTML '
              '= view === "peaks"\n'
          )
          table_end = (
              '      document.getElementById("record-count").textContent'
          )
          table_start_position = app.find(table_start)
          table_end_position = app.find(
              table_end,
              table_start_position,
          )
          if table_start_position < 0 or table_end_position < 0:
              raise RuntimeError(
                  "Could not locate the Records table-render assignment"
              )

          new_table_selection = '''      document.getElementById("record-table").innerHTML = view === "peaks"
                ? peakTable(visible)
                : view === "numberones"
                  ? numberOneTable(visible)
                  : view === "numberonesummary"
                    ? numberOneSummaryTable(visible)
                    : view === "matches"
                      ? matchRecordTable(visible)
                      : view === "upsets"
                        ? upsetTable(visible)
                        : bestTournamentTable(visible);
          '''

          app = (
              app[:table_start_position]
              + new_table_selection
              + app[table_end_position:]
          )

          # Remove Adjusted estimate only as a sorting choice. The informative
          # table columns and explanatory text remain unchanged.
          adjusted_option = (
              '<option value="mean">Adjusted estimate</option>'
          )
          removed_options = app.count(adjusted_option)
          app = app.replace(adjusted_option, "")

          app = app.replace(
              '["rating", "rating_change_12m", "rank_change_12m", '
              '"mean", "matches", "name"]',
              '["rating", "rating_change_12m", "rank_change_12m", '
              '"matches", "name"]',
          )
          app = app.replace(
              '["rating", "mean", "matches", "name"]',
              '["rating", "matches", "name"]',
          )

          if adjusted_option in app:
              raise RuntimeError(
                  "Adjusted estimate sorting option remains in app.js"
              )

          if removed_options:
              print(
                  f"Removed {removed_options} Adjusted estimate sort option(s)."
              )
          else:
              print("Adjusted estimate sort options were already removed.")

          APP_PATH.write_text(
              app.rstrip() + "\n",
              encoding="utf-8",
          )


          NEW_TEST = r'''
              def test_best_tournament_records_and_rating_sort_options(self) -> None:
                  records = self.summary.get("best_tournaments", [])
                  self.assertTrue(records)
                  self.assertEqual(
                      records,
                      sorted(
                          records,
                          key=lambda row: (
                              -row["rating_gain"],
                              row["after"],
                              row["tournament"],
                              row["nation"],
                          ),
                      ),
                  )
                  self.assertTrue(
                      all(row["rating_gain"] > 0 for row in records)
                  )
                  self.assertTrue(
                      all(
                          abs(
                              row["after_rating"]
                              - row["before_rating"]
                              - row["rating_gain"]
                          ) < 1e-7
                          for row in records
                      )
                  )
                  self.assertTrue(
                      all(
                          row["tournament_id"]
                          and row["edition_id"]
                          and row["code"]
                          for row in records
                      )
                  )

                  javascript = (
                      ROOT / "public" / "assets" / "app.js"
                  ).read_text(encoding="utf-8")
                  self.assertIn(
                      'data-record="tournaments"',
                      javascript,
                  )
                  self.assertIn(
                      "function bestTournamentTable",
                      javascript,
                  )
                  self.assertIn(
                      "summary.best_tournaments",
                      javascript,
                  )
                  self.assertNotIn(
                      '<option value="mean">Adjusted estimate</option>',
                      javascript,
                  )
                  self.assertNotIn(
                      '["rating", "mean", "matches", "name"]',
                      javascript,
                  )
          '''

          tests = TEST_PATH.read_text(encoding="utf-8")
          if (
              "def test_best_tournament_records_and_rating_sort_options"
              not in tests
          ):
              marker = "    def test_public_metadata_and_discovery_files"
              position = tests.find(marker)
              if position < 0:
                  raise RuntimeError(
                      "Could not find test insertion point"
                  )
              tests = (
                  tests[:position]
                  + NEW_TEST.rstrip()
                  + "\n\n"
                  + tests[position:]
              )

          TEST_PATH.write_text(
              tests.rstrip() + "\n",
              encoding="utf-8",
          )


          final_build = BUILD_PATH.read_text(encoding="utf-8")
          final_app = APP_PATH.read_text(encoding="utf-8")
          required = [
              "def build_best_tournament_records(",
              'output.summary["best_tournaments"]',
              "function bestTournamentTable(rows)",
              'data-record="tournaments"',
              "summary.best_tournaments || []",
          ]
          missing = [
              marker
              for marker in required
              if marker not in final_build and marker not in final_app
          ]
          if missing:
              raise RuntimeError(
                  "Patch validation failed; missing markers: "
                  + ", ".join(missing)
              )

          print("Best tournament records patch applied.")
          PY

      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Build static site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Audit generated tournament records
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          import json
          from pathlib import Path


          summary = json.loads(
              Path("public/data/summary.json").read_text(
                  encoding="utf-8"
              )
          )
          records = summary.get("best_tournaments", [])

          assert records, "No best tournament records were generated"
          assert records == sorted(
              records,
              key=lambda row: (
                  -row["rating_gain"],
                  row["after"],
                  row["tournament"],
                  row["nation"],
              ),
          )
          assert all(row["rating_gain"] > 0 for row in records)
          assert all(
              abs(
                  row["after_rating"]
                  - row["before_rating"]
                  - row["rating_gain"]
              ) < 1e-7
              for row in records
          )

          javascript = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")
          assert (
              '<option value="mean">Adjusted estimate</option>'
              not in javascript
          )
          assert 'data-record="tournaments"' in javascript

          print(
              f"Generated {len(records)} positive tournament-gain records; "
              f"largest gain: {records[0]['nation']} "
              f"+{records[0]['rating_gain']:.1f} in "
              f"{records[0]['tournament']} {records[0]['edition']}."
          )
          PY

      - name: Run full test suite
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose

      - name: Preserve source changes and discard validation output
        shell: bash
        run: |
          set -euo pipefail

          cp public/assets/app.js /tmp/nfelo-records-app.js

          git restore --worktree -- public
          git clean -fd -- public/data public/tournaments

          cp /tmp/nfelo-records-app.js public/assets/app.js

      - name: Check final patch
        run: |
          set -euo pipefail
          git diff --check
          git diff -- \
            scripts/build_site.py \
            public/assets/app.js \
            tests/test_build.py

      - name: Commit and push changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- \
            scripts/build_site.py \
            public/assets/app.js \
            tests/test_build.py
          then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Best tournament records are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            scripts/build_site.py \
            public/assets/app.js \
            tests/test_build.py

          git commit -m "Add best tournament records"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy updated site
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run pages.yml \
            --ref main \
            -f refresh_source=false \
            -f full_refresh=false
