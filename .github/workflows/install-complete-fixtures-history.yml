name: Install complete fixtures and historical names

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-fixtures-history
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime
        run: python -m pip install --requirement requirements.txt

      - name: Install update
        env:
          UPDATE_ARCHIVE: 
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/network-football-elo-fixtures-history.tar.xz
          tar -xJf /tmp/network-football-elo-fixtures-history.tar.xz
          python -m py_compile scripts/open_results.py scripts/fetch_sources.py scripts/model.py scripts/build_site.py
          node --check public/assets/app.js
          python scripts/build_site.py
          python -m unittest discover --start-directory tests --verbose

      - name: Commit and publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/open_results.py scripts/fetch_sources.py scripts/model.py scripts/build_site.py public/assets/app.js tests/test_build.py README.md
          if git diff --cached --quiet; then
            echo "Update is already installed."
          else
            git commit -m "Expand fixtures and use historical team names"
            git push
          fi
