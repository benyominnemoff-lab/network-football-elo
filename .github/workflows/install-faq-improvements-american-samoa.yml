name: Improve FAQ and correct American Samoa

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-nfelo-faq-improvements
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply reviewed improvements
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent, indent

          def replace_once(path, old, new):
              text = path.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected insertion point not found in {path}: {old[:100]!r}")
              if text.count(old) != 1:
                  raise SystemExit(f"Insertion point is not unique in {path}: {old[:100]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          model = Path("scripts/model.py")
          app = Path("public/assets/app.js")
          styles = Path("public/assets/styles.css")
          tests = Path("tests/test_build.py")

          if "function faqSearchTokens" in app.read_text(encoding="utf-8"):
              print("These FAQ improvements are already installed.")
              raise SystemExit(0)

          replace_once(
              model,
              '        self.team_names = read_dictionary(source / "en.teams.tsv", skip_locations=True)\n',
              '        self.team_names = read_dictionary(source / "en.teams.tsv", skip_locations=True)\n        # WFER retains the obsolete label “Eastern Samoa”; use the current team name.\n        self.team_names["AS"] = "American Samoa"\n',
          )

          replace_once(
              app,
              '            <a href="#/methodology">Read the methodology →</a>\n          </div>',
              '            <div class="home-help-links">\n              <a href="#/methodology">Read the methodology →</a>\n              <a href="#/faq">Questions? Read the FAQ →</a>\n            </div>\n          </div>',
          )

          extra_questions = dedent('''\
              ,
              {
                question: "Why can a team’s rating change by a different amount from its opponent’s?",
                answer: "NFELO is not a strictly two-team, zero-sum Elo system. A result updates the estimated strengths and uncertainty of both teams within the wider opponent network. Their displayed ratings also include separate uncertainty and opponent-breadth adjustments, so one team’s displayed gain does not always exactly equal the other team’s loss."
              },
              {
                question: "Why can an inactive team remain highly ranked?",
                answer: "Ratings measure estimated strength, not recent activity alone. Inactivity gradually increases uncertainty, which lowers the cautious rating shown on the site, but a strong team does not immediately become weak simply because it has not played recently."
              },
              {
                question: "Can ratings from different eras be compared directly?",
                answer: "They can be compared within the model’s historical scale, but such comparisons should not be interpreted literally. Football, scoring levels, participation and the international match network have changed substantially. The model adjusts for these changes, but it cannot prove how teams from different eras would perform against one another."
              },
              {
                question: "Why might a recent result or fixture be missing?",
                answer: "The site depends on external results and fixture feeds. Updates are published only after the data pass validation checks. A match may therefore appear late if its source has not updated, team names cannot be matched safely or different sources report conflicting information."
              },
              {
                question: "What should I do if I find incorrect data?",
                answer: "Check whether the match is also incorrect or missing in the listed source data. If NFELO differs from a reliable published result, report the teams, date, score, competition and venue through the project’s GitHub repository.",
                link: "https://github.com/nfelo/nfelo.github.io",
                linkLabel: "Open the NFELO GitHub repository →"
              }
          ''')
          replace_once(
              app,
              "];\n\nfunction renderFAQ() {",
              extra_questions + "];\n\nfunction faqSearchTokens(value) {\n  return value\n    .normalize(\"NFKD\")\n    .replace(/\\p{Diacritic}/gu, \"\")\n    .toLocaleLowerCase()\n    .match(/[\\p{L}\\p{N}]+/gu)?.map((token) => {\n      if (token.length > 4 && token.endsWith(\"ies\")) return `${token.slice(0, -3)}y`;\n      if (token.length > 3 && token.endsWith(\"s\")) return token.slice(0, -1);\n      return token;\n    }) || [];\n}\n\nfunction renderFAQ() {",
          )

          replace_once(
              app,
              '    const query = search.value.trim().toLocaleLowerCase();\n    const filtered = FAQ_ITEMS.filter((item) => `${item.question} ${item.answer}`.toLocaleLowerCase().includes(query));',
              '    const query = search.value.trim();\n    const terms = faqSearchTokens(query);\n    const filtered = FAQ_ITEMS.filter((item) => {\n      const words = faqSearchTokens(`${item.question} ${item.answer}`);\n      return terms.every((term) => words.some((word) => word.includes(term) || term.includes(word)));\n    });',
          )

          replace_once(
              app,
              '<div class="faq-answer"><p>${escapeHTML(item.answer)}</p></div>',
              '<div class="faq-answer"><p>${escapeHTML(item.answer)}</p>${item.link ? `<a class="faq-source-link" href="${escapeHTML(item.link)}" rel="external">${escapeHTML(item.linkLabel)}</a>` : ""}</div>',
          )

          replace_once(
              styles,
              ".home-support > div:first-child a { color: var(--lime); }",
              ".home-support > div:first-child a { color: var(--lime); }\n.home-help-links { display: flex; flex-wrap: wrap; gap: 10px 22px; margin-top: 18px; }\n.home-help-links a { display: inline-flex; align-items: center; min-height: 32px; }",
          )
          replace_once(
              styles,
              ".faq-answer p { margin: 0; }",
              ".faq-answer p { margin: 0; }\n.faq-source-link { display: inline-block; margin-top: 12px; color: #315f54; font-weight: 800; text-decoration: none; }",
          )
          replace_once(
              styles,
              "  .home-support > div:first-child { padding: 22px 18px; border-radius: 14px; }",
              "  .home-support > div:first-child { padding: 22px 18px; border-radius: 14px; }\n  .home-help-links { display: grid; gap: 6px; }",
          )

          replace_once(
              tests,
              "        self.assertEqual(javascript.count('question: \"'), 20)",
              "        self.assertEqual(javascript.count('question: \"'), 25)",
          )
          test_code = dedent('''\
                  def test_faq_search_home_link_github_and_current_team_name(self) -> None:
                      javascript = (ROOT / "public" / "assets" / "app.js").read_text(encoding="utf-8")
                      self.assertIn("function faqSearchTokens", javascript)
                      self.assertIn('token.endsWith("ies")', javascript)
                      self.assertIn("terms.every", javascript)
                      self.assertIn('href="#/faq">Questions? Read the FAQ →</a>', javascript)
                      self.assertIn("https://github.com/nfelo/nfelo.github.io", javascript)
                      teams = {team["code"]: team["nation"] for team in self.summary["teams"]}
                      self.assertEqual(teams["AS"], "American Samoa")

          ''')
          test_code = indent(test_code, "    ")
          replace_once(
              tests,
              "    def test_methodology_explains_probability_only_layer_in_plain_english(self) -> None:\n",
              test_code + "    def test_methodology_explains_probability_only_layer_in_plain_english(self) -> None:\n",
          )

          print("FAQ improvements and American Samoa naming applied.")
          PY

          git diff --check

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Rebuild and verify complete site
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js
          test -f public/faq/index.html

      - name: Commit improvements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/model.py public tests/test_build.py
          if git diff --cached --quiet; then
            echo "These improvements are already installed."
            exit 0
          fi
          git commit -m "fix: improve FAQ and correct American Samoa name"
          git push origin HEAD:main
