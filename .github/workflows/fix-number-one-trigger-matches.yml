name: Fix number one trigger matches

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-world-number-ones
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPDATE_ARCHIVE: >-
        
      UPDATE_SHA256: 884bacde75214d00eee3e6bec066dff7fd5fed7d7ad93099f6c079df111b56cb

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Verify and apply the attribution fix
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/nfelo-trigger-fix.tar.xz
          echo "$UPDATE_SHA256  /tmp/nfelo-trigger-fix.tar.xz" | sha256sum --check
          tar -xJf /tmp/nfelo-trigger-fix.tar.xz -C .
          python -m py_compile scripts/build_site.py tests/test_build.py

      - name: Rebuild and run regression tests
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish the fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- scripts/build_site.py tests/test_build.py
          if git diff --cached --quiet; then
            echo "The trigger-attribution fix is already installed."
          else
            git commit -m "fix(records): attribute number one changes to causal match"
            git push
          fi
