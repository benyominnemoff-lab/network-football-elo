name: Improve tournament defaults, empty states and lineages

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: improve-tournament-empty-states-lineages
  cancel-in-progress: false

jobs:
  install:
    name: Install and validate page refinements
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Install page refinements
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from __future__ import annotations

          import ast
          from pathlib import Path
          import re
          import textwrap


          APP_PATH = Path("public/assets/app.js")
          BUILD_PATH = Path("scripts/build_site.py")
          TEST_PATH = Path("tests/test_build.py")

          app = APP_PATH.read_text(encoding="utf-8")
          builder = BUILD_PATH.read_text(encoding="utf-8")
          tests = TEST_PATH.read_text(encoding="utf-8")


          def insert_before_once(
              source: str,
              anchor: str,
              insertion: str,
              description: str,
              installed_marker: str,
          ) -> str:
              if installed_marker in source:
                  return source
              count = source.count(anchor)
              if count != 1:
                  raise RuntimeError(
                      f"Expected one {description}; found {count}."
                  )
              return source.replace(anchor, insertion + anchor, 1)


          def replace_once(
              source: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              if new in source:
                  return source
              count = source.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected one {description}; found {count}."
                  )
              return source.replace(old, new, 1)


          def indented_block_pattern(block: str) -> re.Pattern[str]:
              lines = block.strip("\n").splitlines()
              if not lines:
                  raise RuntimeError("Cannot match an empty block.")
              pattern = (
                  r"(?m)^(?P<base>[ \t]*)"
                  + re.escape(lines[0])
              )
              for line in lines[1:]:
                  pattern += (
                      r"\n(?P=base)"
                      + re.escape(line)
                  )
              return re.compile(pattern)


          def replace_indented_block(
              source: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              new_pattern = indented_block_pattern(new)
              if new_pattern.search(source):
                  return source
              old_pattern = indented_block_pattern(old)
              matches = list(old_pattern.finditer(source))
              if len(matches) != 1:
                  raise RuntimeError(
                      f"Expected one {description}; "
                      f"found {len(matches)}."
                  )
              match = matches[0]
              base = match.group("base")
              clean_new = new.strip("\n")
              replacement = base + clean_new.replace(
                  "\n",
                  "\n" + base,
              )
              return (
                  source[:match.start()]
                  + replacement
                  + source[match.end():]
              )


          def js_function_span(source: str, name: str) -> tuple[int, int]:
              pattern = re.compile(
                  rf"(?m)^(?:  )?(?:async\s+)?function {re.escape(name)}\("
              )
              match = pattern.search(source)
              if match is None:
                  raise RuntimeError(f"JavaScript function {name} was not found.")

              starts = []
              for candidate in (
                  "\nfunction ",
                  "\nasync function ",
                  "\n  function ",
                  "\n  async function ",
              ):
                  position = source.find(candidate, match.end())
                  if position >= 0:
                      starts.append(position + 1)
              end = min(starts) if starts else len(source)
              return match.start(), end


          def replace_in_js_function(
              source: str,
              function_name: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              start, end = js_function_span(source, function_name)
              block = source[start:end]
              if new in block:
                  return source
              count = block.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected one {description} in {function_name}; "
                      f"found {count}."
                  )
              block = block.replace(old, new, 1)
              return source[:start] + block + source[end:]


          def replace_indented_in_js_function(
              source: str,
              function_name: str,
              old: str,
              new: str,
              description: str,
          ) -> str:
              start, end = js_function_span(
                  source,
                  function_name,
              )
              block = source[start:end]
              updated = replace_indented_block(
                  block,
                  old,
                  new,
                  f"{description} in {function_name}",
              )
              return source[:start] + updated + source[end:]


          def replace_js_function(
              source: str,
              function_name: str,
              replacement: str,
              installed_marker: str,
          ) -> str:
              start, end = js_function_span(source, function_name)
              block = source[start:end]
              if installed_marker in block:
                  return source
              return source[:start] + replacement.rstrip() + "\n\n" + source[end:]


          app_helpers = textwrap.dedent(r'''
            const PUBLIC_LINEAGE_COMPLETIONS = [
              ["Serbia", "Serbia and Montenegro", "Yugoslavia"],
