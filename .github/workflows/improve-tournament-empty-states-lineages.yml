                      )
                      annotate_ongoing_tournament_editions(
                          path,
                          fixture_payload,
                      )
                      annotated = json.loads(
                          path.read_text(encoding="utf-8")
                      )
                  by_name = {
                      family["name"]: family
                      for family in annotated["families"]
                  }
                  self.assertNotIn(
                      "ongoing",
                      by_name["FIFA World Cup"]["editions"][0],
                  )
                  self.assertTrue(
                      by_name["Copa América"]["editions"][0]["ongoing"]
                  )
                  self.assertEqual(
                      by_name["Copa América"]["editions"][0][
                          "scheduled_through"
                      ],
                      "2026-07-24",
                  )

                  serbia_names = {
                      "Serbia",
                      "Serbia and Montenegro",
                      "Yugoslavia",
                  }
                  serbia = next(
                      team
                      for team in self.summary["teams"]
                      if serbia_names
                      & set(
                          [team["nation"]]
                          + team.get("aliases", [])
                          + team.get("lineage_names", [])
                      )
                  )
                  self.assertTrue(
                      serbia_names <= set(serbia["lineage_names"])
                  )

                  for marker in (
                      "filteredEmptyState",
                      "Change or clear the filters to see results.",
                      "completePublicLineageNames",
                      "formatPublicNameList",
                      "team-lineage-note",
                      "const lineageNamesByCode = new Map(",
                      "source.length",
                  ):
                      self.assertIn(marker, javascript)

          ''')

          new_test_method = (
              textwrap.indent(
                  new_test_method.strip("\n"),
                  "    ",
              )
              + "\n"
          )

          tree = ast.parse(tests)
          test_class = next(
              (
                  node
                  for node in tree.body
                  if isinstance(node, ast.ClassDef)
                  and node.name == "StaticBuildTests"
              ),
              None,
          )
          if test_class is None:
              raise RuntimeError("StaticBuildTests was not found.")

          if not any(
              isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))
              and node.name
              == "test_tournament_defaults_empty_states_and_lineages"
              for node in test_class.body
          ):
              lines = tests.splitlines(keepends=True)
              insert_at = test_class.end_lineno
              lines.insert(insert_at, "\n" + new_test_method)
              tests = "".join(lines)

          ast.parse(tests)

          required_app = (
              "const PUBLIC_LINEAGE_COMPLETIONS = [",
              "const ongoing = major.filter(",
              'if (!items.length) return filteredEmptyState("teams");',
              'if (!matches.length) return filteredEmptyState("matches");',
              "const lineageNamesByCode = new Map(",
              "const uniqueRecordNames = completePublicLineageNames;",
              'filteredEmptyState("records")',
              "const lineageNote = lineageNames.length > 1",
              "${lineageNote}",
          )
          missing_app = [
              marker for marker in required_app if marker not in app
          ]
          if missing_app:
              raise RuntimeError(
                  "Application migration incomplete; missing: "
                  + ", ".join(missing_app)
              )

          required_builder = (
              "MANDATORY_LINEAGE_COMPLETIONS:",
              "def annotate_ongoing_tournament_editions(",
              'latest["ongoing"] = True',
              "Public label normalisation changed model verification data.",
          )
          missing_builder = [
              marker for marker in required_builder if marker not in builder
          ]
          if missing_builder:
              raise RuntimeError(
                  "Builder migration incomplete; missing: "
                  + ", ".join(missing_builder)
              )

          required_tests = (
              "test_tournament_defaults_empty_states_and_lineages",
              '"Copa América"',
              '"UEFA European Championship"',
              '"FIFA World Cup"',
              "serbia_names <=",
          )
          missing_tests = [
              marker for marker in required_tests if marker not in tests
          ]
          if missing_tests:
              raise RuntimeError(
                  "Test migration incomplete; missing: "
                  + ", ".join(missing_tests)
              )

          compile(builder, str(BUILD_PATH), "exec")
          compile(tests, str(TEST_PATH), "exec")

          APP_PATH.write_text(app, encoding="utf-8", newline="\n")
          BUILD_PATH.write_text(builder, encoding="utf-8", newline="\n")
          TEST_PATH.write_text(tests, encoding="utf-8", newline="\n")

          print(
              "Installed ongoing-major precedence, concise filtered empty "
              "states, complete lineage notes and Serbia/Yugoslavia completion."
          )
          PY

          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js
          git diff --check

      - name: Build and run complete validation
        shell: bash
        run: |
          set -euo pipefail

          python scripts/build_site.py

          set +e
          python -m unittest discover             --start-directory tests             --verbose             2>&1 | tee /tmp/nfelo-page-refinement-tests.log
          test_status="${PIPESTATUS[0]}"
          set -e

          if [ "$test_status" -ne 0 ]; then
            echo "::error::The complete test suite failed."
            tail -n 350 /tmp/nfelo-page-refinement-tests.log
            exit "$test_status"
          fi

          node --check public/assets/app.js
          if [ -f scripts/smoke_browser_boot.js ]; then
            node scripts/smoke_browser_boot.js public
          fi
          if [ -f scripts/audit_site_consistency.py ]; then
            python scripts/audit_site_consistency.py --public public
          fi

          python - <<'PY'
          from pathlib import Path
          import json

          summary = json.loads(
              Path("public/data/summary.json").read_text(
                  encoding="utf-8"
              )
          )
          catalog = json.loads(
              Path(
                  "public/data/tournaments/index.json"
              ).read_text(encoding="utf-8")
          )

          required = {
              "Serbia",
              "Serbia and Montenegro",
              "Yugoslavia",
          }
          serbia = next(
              team
              for team in summary["teams"]
              if required
              & set(
                  [team["nation"]]
                  + team.get("aliases", [])
                  + team.get("lineage_names", [])
              )
          )
          if not required <= set(serbia["lineage_names"]):
              raise RuntimeError(
                  "Serbia lineage is incomplete: "
                  + repr(serbia["lineage_names"])
              )

          ongoing = [
              (
                  family["name"],
                  edition["label"],
                  edition.get("scheduled_through"),
              )
              for family in catalog["families"]
              for edition in family["editions"]
              if edition.get("ongoing")
          ]
          print("Completed Serbia lineage:", serbia["lineage_names"])
          print("Ongoing major editions:", ongoing)
          PY

      - name: Restore generated files and verify commit scope
        shell: bash
        run: |
          set -euo pipefail

          git restore --worktree -- .             ':(exclude)public/assets/app.js'             ':(exclude)scripts/build_site.py'             ':(exclude)tests/test_build.py'

          mapfile -t changed < <(
            git diff --name-only --               public/assets/app.js               scripts/build_site.py               tests/test_build.py
          )
          if [ "${#changed[@]}" -ne 0 ] && [ "${#changed[@]}" -ne 3 ]; then
            printf 'Expected either zero changes (already installed) or exactly three changed source files; got:\n'
            printf '  %s\n' "${changed[@]}"
            exit 1
          fi

          unexpected="$(
            git diff --name-only               | grep -Ev                 '^(public/assets/app\.js|scripts/build_site\.py|tests/test_build\.py)$'               || true
          )"
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected tracked changes remain:"
            printf '%s\n' "$unexpected"
            exit 1
          fi

          git diff --check

      - name: Commit refinements
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add             public/assets/app.js             scripts/build_site.py             tests/test_build.py

          if git diff --cached --quiet; then
            echo "The refinements are already installed."
            exit 0
          fi

          git commit -m "Improve tournament defaults and lineage guidance"
          git push origin HEAD:main

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: page-refinement-diagnostics
          if-no-files-found: warn
          retention-days: 7
          path: |
            /tmp/nfelo-page-refinement-tests.log
            public/data/summary.json
            public/data/tournaments/index.json
