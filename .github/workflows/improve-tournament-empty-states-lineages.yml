                      '  ],' + "\n"
                      '  [' + "\n"
                      '    family("UEFA European Championship", "2026-07-18", true),' + "\n"
                      '    family("Copa América", "2026-07-20", true),' + "\n"
                      '  ],' + "\n"
                      '  [' + "\n"
                      '    family("FIFA World Cup", "2026-07-01"),' + "\n"
                      '    family("Copa América", "2026-07-20"),' + "\n"
