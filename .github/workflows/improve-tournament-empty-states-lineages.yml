                          "FIFA World Cup",
                          "Copa América",
                      ],
                  )

                  from build_site import (  # noqa: PLC0415
                      annotate_ongoing_tournament_editions,
                  )

                  catalog = {
                      "categories": [
                          "Global championships",
                          "Continental championships",
                      ],
                      "families": [
                          {
                              "name": "FIFA World Cup",
                              "editions": [
                                  {
                                      "start": "2026-06-01",
                                      "end": "2026-07-15",
                                      "after": "2026-07-15",
                                  }
                              ],
                          },
                          {
                              "name": "Copa América",
