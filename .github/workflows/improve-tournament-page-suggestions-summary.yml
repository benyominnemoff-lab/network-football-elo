name: Improve Tournament page suggestions and summary

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: improve-tournament-page-suggestions-summary
  cancel-in-progress: false

jobs:
  update:
    name: Improve Tournament page
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Patch Tournament page
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re


          path = Path("public/assets/app.js")
          javascript = path.read_text(encoding="utf-8")


          def indent_block(block: str, indent: str) -> str:
              return "\n".join(
                  indent + line if line else ""
                  for line in block.splitlines()
              )


          # Replace the static, cross-tournament placeholder while
          # preserving every other input attribute.
          search_pattern = re.compile(
              r'(<input id="tournament-search"[^>]*'
              r'\bplaceholder=")[^"]*(")',
          )
          javascript, search_replacements = search_pattern.subn(
              r'\1Search tournament teams…\2',
              javascript,
              count=1,
          )
          if search_replacements != 1:
              raise RuntimeError(
                  "Expected exactly one Tournament team search field; "
                  f"updated {search_replacements}."
              )


          placeholder_marker = (
              "const updateTournamentSearchPlaceholder = "
              "(participants) => {"
          )
          if placeholder_marker not in javascript:
              load_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)'
                  r'const loadSelection = async \(\) => \{',
                  flags=re.MULTILINE,
              )

              helper = r'''const updateTournamentSearchPlaceholder = (participants) => {
                const names = [
                  ...new Set(
                    participants
                      .map(
                        (participant) => (
                          participant.nation
                          || summaryNames.get(participant.code)
                          || participant.code
                        ),
                      )
                      .filter(Boolean),
                  ),
                ];

                for (
                  let index = names.length - 1;
                  index > 0;
                  index -= 1
                ) {
                  const swapIndex = Math.floor(
                    Math.random() * (index + 1),
                  );
                  [names[index], names[swapIndex]] = [
                    names[swapIndex],
                    names[index],
                  ];
                }

                const examples = names.slice(
                  0,
                  Math.min(3, names.length),
                );
                const suffix = examples.length < names.length
                  ? "…"
                  : "";

                document.getElementById(
                  "tournament-search",
                ).placeholder = examples.length
                  ? `${examples.join(", ")}${suffix}`
                  : "Search tournament teams…";
              };'''

              def insert_helper(match: re.Match[str]) -> str:
                  indent = match.group("indent")
                  return (
                      indent_block(helper, indent)
                      + "\n\n"
                      + match.group(0)
                  )

              javascript, helper_replacements = load_pattern.subn(
                  insert_helper,
                  javascript,
                  count=1,
              )
              if helper_replacements != 1:
                  raise RuntimeError(
                      "Expected exactly one Tournament loadSelection "
                      f"function; updated {helper_replacements}."
                  )


          placeholder_call = (
              "updateTournamentSearchPlaceholder(participants);"
          )
          if placeholder_call not in javascript:
              participants_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)'
                  r'const participants\s*=\s*'
                  r'editionParticipants\(\);[ \t]*\n'
                  r'(?P=indent)'
                  r'teams\s*=\s*participants\.map'
                  r'\(\(participant\)\s*=>\s*\{',
                  flags=re.MULTILINE,
              )

              def insert_placeholder_call(
                  match: re.Match[str],
              ) -> str:
                  indent = match.group("indent")
                  return (
                      f"{indent}const participants = "
                      "editionParticipants();\n"
                      f"{indent}"
                      "updateTournamentSearchPlaceholder(participants);\n"
                      f"{indent}"
                      "teams = participants.map((participant) => {"
                  )

              javascript, participant_replacements = (
                  participants_pattern.subn(
                      insert_placeholder_call,
                      javascript,
                      count=1,
                  )
              )
              if participant_replacements != 1:
                  raise RuntimeError(
                      "Expected exactly one Tournament participant "
                      "loading block; updated "
                      f"{participant_replacements}."
                  )


          summary_marker = "// Tournament edition summary"
          if summary_marker not in javascript:
              summary_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)'
                  r'const rankedCount = teams\.filter\('
                  r'[\s\S]*?'
                  r'(?=^(?P=indent)setTitle\()',
                  flags=re.MULTILINE,
              )

              summary = r'''// Tournament edition summary
              const rankedCount = teams.filter(
                (team) => team.rating != null,
              ).length;
              const unratedCount = teams.length - rankedCount;
              const coverageNote = unratedCount > 0
                ? ` All participants are shown, including teams without a published rating; ${number(unratedCount)} ${unratedCount === 1 ? "team was" : "teams were"} unrated ${selectedView === "after" ? "after" : "before"} the tournament.`
                : "";

              document.getElementById("tournament-count").textContent =
                number(teams.length);
              document.getElementById("tournament-label").textContent =
                `${selectedFamily.name} · ${selectedEdition.label}`;
              document.getElementById("tournament-description").textContent =
                selectedView === "after"
                  ? `The tournament ended on ${validDate(selectedEdition.end)}. Rank change compares each team's place in the full world ranking. Rating change includes only matches from this edition, excluding recalibration and unrelated results.${coverageNote}`
                  : `The tournament ended on ${validDate(selectedEdition.end)}. This snapshot shows each participant immediately before the tournament.${coverageNote}`;
          '''

              def replace_summary(match: re.Match[str]) -> str:
                  return indent_block(
                      summary.rstrip(),
                      match.group("indent"),
                  ) + "\n"

              javascript, summary_replacements = (
                  summary_pattern.subn(
                      replace_summary,
                      javascript,
                      count=1,
                  )
              )
              if summary_replacements != 1:
                  raise RuntimeError(
                      "Expected exactly one Tournament summary block; "
                      f"updated {summary_replacements}."
                  )


          required = [
              'number-one-from-calendar").max',
              'number-one-to-calendar").min',
              'placeholder="Search tournament teams…"',
              placeholder_marker,
              "Math.random() * (index + 1)",
              "Math.min(3, names.length)",
              "examples.length < names.length",
              placeholder_call,
              summary_marker,
              "const unratedCount = teams.length - rankedCount;",
              "const coverageNote = unratedCount > 0",
              "including teams without a published rating",
              (
                  "The tournament ended on "
                  "${validDate(selectedEdition.end)}"
              ),
              (
                  "Rank change compares each team's place in the "
                  "full world ranking."
              ),
              (
                  "excluding recalibration and unrelated results."
              ),
          ]
          missing = [
              marker
              for marker in required
              if marker not in javascript
          ]
          if missing:
              raise RuntimeError(
                  "Tournament page validation failed; missing: "
                  + ", ".join(missing)
              )

          if 'placeholder="Brazil, Thailand, Morocco…"' in javascript:
              raise RuntimeError(
                  "The old cross-tournament placeholder remains."
              )

          path.write_text(
              javascript.rstrip() + "\n",
              encoding="utf-8",
          )

          print(
              "Installed tournament-specific suggestions, conditional "
              "rating coverage, and the tournament end date."
          )
          PY

      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Build static site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Audit generated Tournament page
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path


          javascript = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")

          required = [
              'placeholder="Search tournament teams…"',
              (
                  "const updateTournamentSearchPlaceholder = "
                  "(participants) => {"
              ),
              "Math.random() * (index + 1)",
              "Math.min(3, names.length)",
              "examples.length < names.length",
              "updateTournamentSearchPlaceholder(participants);",
              "const unratedCount = teams.length - rankedCount;",
              "const coverageNote = unratedCount > 0",
              (
                  "The tournament ended on "
                  "${validDate(selectedEdition.end)}"
              ),
              (
                  "This snapshot shows each participant immediately "
                  "before the tournament."
              ),
              (
                  "Rank change compares each team's place in the "
                  "full world ranking."
              ),
          ]
          missing = [
              marker
              for marker in required
              if marker not in javascript
          ]
          assert not missing, missing

          assert (
              'placeholder="Brazil, Thailand, Morocco…"'
              not in javascript
          )

          # The implementation uses min(3, team count), so two-team
          # editions display two suggestions and larger editions display
          # no more than three.
          def example_count(team_count: int) -> int:
              return min(3, team_count)

          assert example_count(2) == 2
          assert example_count(3) == 3
          assert example_count(8) == 3

          # The coverage sentence is guarded, so it is absent whenever
          # every participant has a published rating.
          assert "unratedCount > 0" in javascript
          assert ': ""' in javascript

          print(
              "Audited tournament-specific suggestions, two-team "
              "handling, conditional coverage, and end-date text."
          )
          PY

      - name: Run complete verification
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js

      - name: Preserve source asset only
        shell: bash
        run: |
          set -euo pipefail

          cp public/assets/app.js /tmp/nfelo-tournament-app.js
          git restore --worktree -- public
          git clean -fd -- public
          cp /tmp/nfelo-tournament-app.js public/assets/app.js

      - name: Check final patch
        shell: bash
        run: |
          set -euo pipefail

          node --check public/assets/app.js
          git diff --check

          changed="$(git diff --name-only)"
          if [ "$changed" != "public/assets/app.js" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed"
            exit 1
          fi

          grep -F \
            'Math.min(3, names.length)' \
            public/assets/app.js
          grep -F \
            'const coverageNote = unratedCount > 0' \
            public/assets/app.js
          grep -F \
            'The tournament ended on ${validDate(selectedEdition.end)}' \
            public/assets/app.js

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- public/assets/app.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "The Tournament page improvements are already installed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/assets/app.js
          git commit -m "Improve Tournament page suggestions and summary"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm automatic Pages trigger
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "The push to main automatically triggers pages.yml."
          echo "No duplicate workflow_dispatch is sent."
