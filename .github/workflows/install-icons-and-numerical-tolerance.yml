        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/nfelo-icon-and-tolerance-release.tar.xz"
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > "$archive"
          echo "b0d4c78856d9bc0ddd50c9a4a989de88a6008ab1177069ac6e931fd78939e523  $archive" | sha256sum --check

          python - "$archive" <<'PY'
          import sys
          import tarfile
          from pathlib import PurePosixPath

          expected = {
              "config/404.html",
              "public/apple-touch-icon-2026.png",
              "public/favicon-2026.ico",
              "public/favicon-2026.svg",
              "public/favicon.ico",
              "public/icon-192-2026.png",
              "public/icon-512-2026.png",
              "public/index.html",
              "public/site.webmanifest",
              "tests/test_build.py",
          }
          with tarfile.open(sys.argv[1], "r:xz") as bundle:
              members = bundle.getmembers()
              names = {
                  str(PurePosixPath(member.name))
                  for member in members
              }
              if names != expected:
                  raise SystemExit(
                      f"Unexpected archive contents: expected={sorted(expected)!r}, actual={sorted(names)!r}"
                  )
              if any(not member.isfile() for member in members):
                  raise SystemExit("The release archive may contain regular files only.")
              bundle.extractall(path=".", filter="data")
          PY

      - name: Verify exact release files and scope
        run: |
          python - <<'PY'
          import hashlib
          import subprocess
          from pathlib import Path

          expected_hashes = {
              "config/404.html":
                  "4ee0a40d9b59f1b8ddfe7164ad3325293845c5a5708f51b58a3b321c31b6015c",
              "public/apple-touch-icon-2026.png":
                  "5f702b0dc3aa274b53b869ead8fe41259b0ae8fa5f3c1955b1d98d937f904837",
              "public/favicon-2026.ico":
                  "1170b601fee990e59f7eefb1fe5b1227387d5ebc1a22a2e3ea26247f75f7ea97",
              "public/favicon-2026.svg":
                  "b2b3f939918f77e71e7b90555333dabe3ad838d7b2b15671b8e6b7aecde51bb7",
              "public/favicon.ico":
                  "1170b601fee990e59f7eefb1fe5b1227387d5ebc1a22a2e3ea26247f75f7ea97",
              "public/icon-192-2026.png":
                  "a0b76805daa732a19c25931954adb6699d85afe8f5089efe4940f9ca7673af6f",
              "public/icon-512-2026.png":
                  "4ff197e423cb9fef10f990df77f05db48cd138563d0eaefd253558eeb12ebfcd",
              "public/index.html":
                  "3922293936d68311bec5a1f294ec4736f4394c674b98ed7e6d28446c8361fdc2",
              "public/site.webmanifest":
                  "7e1c4c164d7ed87f0875db1c413b4413f8b3dea3f83c25caa1b529a61d5f408d",
              "tests/test_build.py":
                  "86aab9052ffa32ea61ddfd7fc8fe1b7ae1bc21f42842a97ea4ec7e1d2438efab",
          }
          for filename, expected in expected_hashes.items():
              actual = hashlib.sha256(Path(filename).read_bytes()).hexdigest()
              if actual != expected:
                  raise SystemExit(
                      f"Wrong release file for {filename}: expected={expected}, actual={actual}"
                  )

          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", "HEAD"],
              text=True,
          ).splitlines())
          changed.update(subprocess.check_output(
              ["git", "ls-files", "--others", "--exclude-standard"],
              text=True,
          ).splitlines())
          unexpected = changed - set(expected_hashes)
          if unexpected:
              raise SystemExit(
                  f"Unexpected files changed before build: {sorted(unexpected)!r}"
              )
          print(f"Exact release and scope verified ({len(changed)} file(s) need updating).")
          PY

      - name: Rebuild the complete site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run the complete validation suite
        run: |
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js
          git diff --check

      - name: Verify numerical and icon behaviour
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          public = Path("public")
          summary = json.loads(
              (public / "data" / "summary.json").read_text(encoding="utf-8")
          )
          research = json.loads(
              Path("research/friendly-ratio-full-sample.json").read_text(
                  encoding="utf-8"
              )
          )
          actual = (
              summary["parameters"]["forecast_layer"]["calibration"]["nfelo_weight"]
          )
          expected = (
              research["deployed_python_replay_cross_check"]
              ["calibration_2026"]["nfelo_weight"]
          )
          if abs(actual - expected) > 0.000002:
              raise SystemExit("The optimiser result is outside the audited tolerance.")

          test_source = Path("tests/test_build.py").read_text(encoding="utf-8")
          if 'delta=0.000002' not in test_source:
              raise SystemExit("The permanent optimiser tolerance is missing.")

          required_html = (
              'href="favicon-2026.ico"',
              'href="favicon-2026.svg"',
              'href="apple-touch-icon-2026.png"',
              'href="site.webmanifest?v=20260723"',
          )
          for relative in (
              "index.html",
              "rankings/index.html",
              "team/AR/index.html",
          ):
              html = (public / relative).read_text(encoding="utf-8")
              for required in required_html:
                  if required not in html:
                      raise SystemExit(
                          f"{relative} is missing icon declaration {required}"
                      )

          page_404 = (public / "404.html").read_text(encoding="utf-8")
          for required in (
              'href="/favicon-2026.ico"',
              'href="/favicon-2026.svg"',
              'href="/apple-touch-icon-2026.png"',
          ):
              if required not in page_404:
                  raise SystemExit(f"404.html is missing {required}")

          webmanifest = json.loads(
              (public / "site.webmanifest").read_text(encoding="utf-8")
          )
          if webmanifest["theme_color"] != "#2b103b":
              raise SystemExit("Wrong mobile theme colour.")
          if {
              icon["src"]
              for icon in webmanifest["icons"]
          } != {
              "icon-192-2026.png",
              "icon-512-2026.png",
          }:
              raise SystemExit("Wrong mobile manifest icons.")

          build_manifest = json.loads(
              (public / "build-manifest.json").read_text(encoding="utf-8")
          )
          required_files = {
              "apple-touch-icon-2026.png",
              "favicon-2026.ico",
              "favicon-2026.svg",
              "favicon.ico",
              "icon-192-2026.png",
              "icon-512-2026.png",
              "site.webmanifest",
          }
          missing = required_files - set(build_manifest["files"])
          if missing:
              raise SystemExit(
                  f"Built site omits icon assets: {sorted(missing)!r}"
              )
          print("Numerical tolerance and desktop/mobile icon coverage verified.")
          PY

      - name: Commit and publish the validated fixes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- config/404.html public/apple-touch-icon-2026.png public/favicon-2026.ico public/favicon-2026.svg public/favicon.ico public/icon-192-2026.png public/icon-512-2026.png public/index.html public/site.webmanifest tests/test_build.py
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "The numerical tolerance and icon fixes are already installed."
            exit 0
          fi
          git commit -m "Fix optimiser tolerance and refresh browser icons"
          git push origin HEAD:main
