name: Install icon and numerical tolerance fixes

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-icon-and-numerical-tolerance-fixes
  cancel-in-progress: false

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Confirm repository
        run: |
          set -euo pipefail
          if [ "$GITHUB_REPOSITORY" != "nfelo/nfelo.github.io" ]; then
            echo "::error::This installer is only for nfelo/nfelo.github.io."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Confirm a compatible starting point
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          old_or_final = {
              "config/404.html": {
                  "2f82f81b656ccb75b5b3dd2848eb5c732443840070b5ddba512717633a4067c7",
                  "4ee0a40d9b59f1b8ddfe7164ad3325293845c5a5708f51b58a3b321c31b6015c",
              },
              "public/index.html": {
                  "637fdcaac881a697c81321332b53714a545ed3b68cfcafeeb5f7b99c2f058d59",
                  "3922293936d68311bec5a1f294ec4736f4394c674b98ed7e6d28446c8361fdc2",
              },
              "tests/test_build.py": {
                  "753dd258d732fdc163a08f3d0abfe3e29df76c0e7bc58139e0c05a302d2514f9",
                  "86aab9052ffa32ea61ddfd7fc8fe1b7ae1bc21f42842a97ea4ec7e1d2438efab",
              },
          }
          new_files = {
              "public/apple-touch-icon-2026.png":
                  "5f702b0dc3aa274b53b869ead8fe41259b0ae8fa5f3c1955b1d98d937f904837",
              "public/favicon-2026.ico":
                  "1170b601fee990e59f7eefb1fe5b1227387d5ebc1a22a2e3ea26247f75f7ea97",
              "public/favicon-2026.svg":
                  "b2b3f939918f77e71e7b90555333dabe3ad838d7b2b15671b8e6b7aecde51bb7",
              "public/favicon.ico":
                  "1170b601fee990e59f7eefb1fe5b1227387d5ebc1a22a2e3ea26247f75f7ea97",
              "public/icon-192-2026.png":
                  "a0b76805daa732a19c25931954adb6699d85afe8f5089efe4940f9ca7673af6f",
              "public/icon-512-2026.png":
                  "4ff197e423cb9fef10f990df77f05db48cd138563d0eaefd253558eeb12ebfcd",
              "public/site.webmanifest":
                  "7e1c4c164d7ed87f0875db1c413b4413f8b3dea3f83c25caa1b529a61d5f408d",
          }

          def digest(path):
              return hashlib.sha256(path.read_bytes()).hexdigest()

          for filename, accepted in old_or_final.items():
              path = Path(filename)
              actual = digest(path)
              if actual not in accepted:
                  raise SystemExit(
                      f"{filename} has changed since this release was prepared: {actual}"
                  )
          for filename, final in new_files.items():
              path = Path(filename)
              if path.exists() and digest(path) != final:
                  raise SystemExit(
                      f"{filename} already exists with unexpected contents."
                  )
          print("Compatible current or already-installed release detected.")
          PY

