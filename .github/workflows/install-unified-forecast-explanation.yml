        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/nfelo-unified-explanation.patch.xz"
          patch_file="$RUNNER_TEMP/nfelo-unified-explanation.patch"
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > "$archive"
          xz --decompress --stdout "$archive" > "$patch_file"
          echo "6435fb4d090d8f075f7765a5413185968074d0489c15161c8823530c058322aa  $patch_file" | sha256sum --check
          git apply --check --whitespace=error-all "$patch_file"
          git apply --whitespace=error-all "$patch_file"

      - name: Rebuild the complete site
        run: python scripts/build_site.py --source source --config config --output public

      - name: Run the complete validation suite
        run: |
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js
          git diff --check

      - name: Verify the exact release and file scope
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          expected = {
              "README.md",
              "docs/model-validation.md",
              "public/assets/app.js",
              "scripts/model.py",
              "tests/test_build.py",
          }
          changed = set(subprocess.check_output(
              [
                  "git", "diff", "--name-only", "HEAD", "--",
                  "README.md", "docs", "public/assets/app.js", "scripts", "tests",
              ],
              text=True,
          ).splitlines())
          if changed != expected:
              raise SystemExit(
                  f"Unexpected changed files: expected={sorted(expected)!r}, actual={sorted(changed)!r}"
              )

          summary = json.loads(Path("public/data/summary.json").read_text(encoding="utf-8"))
          nested = summary["validation"]["nested"]
          expected_metrics = {
              "best_scalar_elo_accuracy": 0.58527,
              "g_elo_log_loss": 0.895187,
              "g_elo_accuracy": 0.58779,
              "published_wfe_accuracy": 0.58804,
          }
          for key, expected_value in expected_metrics.items():
              if nested.get(key) != expected_value:
                  raise SystemExit(f"Wrong validation value for {key}: {nested.get(key)!r}")

          javascript = Path("public/assets/app.js").read_text(encoding="utf-8")
          required = (
              "Why can the lower-rated team be the forecast favourite?",
              "Why can a lower-rated team be the forecast favourite?",
              "Public rating and match forecast",
              "Forecast validation",
              "G-Elo comparison",
              "current attack/defence layer preserves the network's top choice",
              "yearNumber(f.calibration.year)",
              "yearNumber(f.calibration.training_first_year)",
              "yearNumber(f.calibration.training_last_year)",
          )
          for phrase in required:
              if phrase not in javascript:
                  raise SystemExit(f"Missing release text: {phrase}")
          forbidden = (
              "Does that mean a friendly is treated exactly like a World Cup match?",
              "number(f.calibration.year)",
              "number(f.calibration.training_first_year)",
              "number(f.calibration.training_last_year)",
          )
          for phrase in forbidden:
              if phrase in javascript:
                  raise SystemExit(f"Obsolete or incorrectly formatted text remains: {phrase}")
          print("Unified explanation, validation table and year formatting verified.")
          PY

      - name: Commit and publish the validated release
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- README.md docs/model-validation.md public/assets/app.js scripts/model.py tests/test_build.py
          if git diff --cached --quiet; then
            echo "The unified explanation release is already installed."
            exit 0
          fi
          git commit -m "Unify rating and forecast documentation"
          git push origin HEAD:main
