name: Install ranking movement and team comparison

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: install-site-features
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      UPDATE_ARCHIVE: >-
        
      UPDATE_SHA256: 843c85f37661c2456a688f4b84b3e8f24d796ac3561f8169ddf0be208a073474

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Verify and apply the feature files
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | tr -d '[:space:]' | base64 --decode > /tmp/nfelo-ranking-compare-filter.tar.xz
          echo "$UPDATE_SHA256  /tmp/nfelo-ranking-compare-filter.tar.xz" | sha256sum --check
          tar -xJf /tmp/nfelo-ranking-compare-filter.tar.xz -C .
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Rebuild and test the complete site
        run: |
          python scripts/build_site.py --source source --config config --output public
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js

      - name: Commit and publish the features
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- scripts/build_site.py public/assets/app.js public/assets/styles.css public/index.html tests/test_build.py
          if git diff --cached --quiet; then
            echo "The requested features are already installed."
          else
            git commit -m "feat(site): add annual movement comparison and number one filters"
            git push
          fi
