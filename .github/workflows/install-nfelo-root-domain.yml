name: Install nfelo root domain migration

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime
        run: python -m pip install --requirement requirements.txt
      - name: Install and verify root-domain update
        env:
          UPDATE_ARCHIVE: 
        run: |
          printf '%s' "$UPDATE_ARCHIVE" | base64 --decode > /tmp/root-domain-migration.tar.xz
          tar -xJf /tmp/root-domain-migration.tar.xz
          python scripts/build_site.py
          python -m unittest discover --start-directory tests --verbose
          node --check public/assets/app.js
          if grep -R -E 'benyominnemoff-lab\.github\.io|/network-football-elo/' public --include='*.html' --include='*.xml' --include='*.txt' --include='*.js'; then
            echo 'Old public URL remains in the generated site.' >&2
            exit 1
          fi
      - name: Commit root-domain configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/build_site.py public/index.html public/robots.txt config/404.html tests/test_build.py
          git commit -m "Migrate site to nfelo.github.io root domain"
          git push
