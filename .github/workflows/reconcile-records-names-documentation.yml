name: Reconcile Records names and documentation

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reconcile-records-names-documentation
  cancel-in-progress: false

jobs:
  update:
    name: Update Records and documentation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install reproducible runtime
        run: python -m pip install --requirement requirements.txt

      - name: Patch Records, About, FAQ and README
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from pathlib import Path
          import re


          APP_PATH = Path("public/assets/app.js")
          README_PATH = Path("README.md")
          TEST_PATH = Path("tests/test_build.py")

          app = APP_PATH.read_text(encoding="utf-8")
          readme = README_PATH.read_text(encoding="utf-8")
          tests = TEST_PATH.read_text(encoding="utf-8")


          def replace_once_or_present(
              text: str,
              old: str,
              new: str,
              marker: str,
              description: str,
          ) -> str:
              if marker in text:
                  return text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(
                      f"Expected exactly one {description}; found {count}"
                  )
              return text.replace(old, new, 1)


          def indent_block(block: str, indent: str) -> str:
              return "\n".join(
                  indent + line if line else ""
                  for line in block.splitlines()
              )


          # Records route metadata should name every record family.
          app = replace_once_or_present(
              app,
              (
                  'records: "All-time national-team rating peaks, '
                  'greatest matchups and largest upsets.",'
              ),
              (
                  'records: "Nation peaks, number-one records, top '
                  'matches, largest upsets and tournament rating gains.",'
              ),
              (
                  'records: "Nation peaks, number-one records, top '
                  'matches, largest upsets and tournament rating gains.",'
              ),
              "Records metadata description",
          )


          # Use one brief introduction that covers all six tabs.
          old_records_lede = (
              "Nation peaks show each country's highest rating. "
              "Top matches rank individual fixtures by the combined "
              "pre-match rating of both teams. Limited or narrowly "
              "connected schedules receive an uncertainty adjustment."
          )
          new_records_lede = (
              "Explore nation peaks, No. 1 chronology and totals, top "
              "matchups, largest upsets and the biggest tournament "
              "rating gains."
          )
          app = replace_once_or_present(
              app,
              old_records_lede,
              new_records_lede,
              new_records_lede,
              "Records page introduction",
          )


          # Build one deterministic team label per canonical successor
          # lineage. Current name comes first; distinct historical names
          # represented in the top 500 are retained as aliases.
          lineage_marker = (
              "const bestTournamentCurrentNames = new Map("
          )
          if lineage_marker not in app:
              team_block_pattern = re.compile(
                  r'(?P<indent>^[ \t]*)'
                  r'const bestTournamentRows = '
                  r'\(summary\.best_tournaments \|\| \[\]\)'
                  r'\.slice\(0, 500\);[ \t]*\n'
                  r'[\s\S]*?'
                  r'(?=^(?P=indent)'
                  r'const bestTournamentTeamOptions =)',
                  flags=re.MULTILINE,
              )

              team_block = r'''const bestTournamentRows = (summary.best_tournaments || []).slice(0, 500);
              const bestTournamentCurrentNames = new Map(
                summary.teams.map(
                  (team) => [team.code, team.nation],
                ),
              );
              const bestTournamentAliases = new Map();

              bestTournamentRows.forEach((row) => {
                const currentName = bestTournamentCurrentNames.get(
                  row.code,
                );
                if (
                  !row.nation
                  || row.nation === currentName
                ) {
                  return;
                }
                if (!bestTournamentAliases.has(row.code)) {
                  bestTournamentAliases.set(row.code, new Set());
                }
                bestTournamentAliases.get(row.code).add(row.nation);
              });

              const bestTournamentTeams = [
                ...new Set(
                  bestTournamentRows.map((row) => row.code),
                ),
              ]
                .map((code) => {
                  const aliases = [
                    ...(bestTournamentAliases.get(code) || []),
                  ].sort((a, b) => a.localeCompare(b));
                  const nation = (
                    bestTournamentCurrentNames.get(code)
                    || aliases[0]
                    || code
                  );
                  const displayAliases = aliases.filter(
                    (alias) => alias !== nation,
                  );
                  return {
                    code,
                    nation,
                    aliases: displayAliases,
                    label: displayAliases.length
                      ? `${nation} (incl. ${displayAliases.join(", ")})`
                      : nation,
                  };
                })
                .sort(
                  (a, b) => (
                    a.label.localeCompare(b.label)
                    || a.code.localeCompare(b.code)
                  ),
                );
          '''

              def replace_team_block(
                  match: re.Match[str],
              ) -> str:
                  return (
                      indent_block(
                          team_block.rstrip(),
                          match.group("indent"),
                      )
                      + "\n"
                  )

              app, replacements = team_block_pattern.subn(
                  replace_team_block,
                  app,
                  count=1,
              )
              if replacements != 1:
                  raise RuntimeError(
                      "Expected exactly one Best tournaments team-data "
                      f"block; replaced {replacements}."
                  )

          app = replace_once_or_present(
              app,
              (
                  '+ `${escapeHTML(team.nation)}</option>`'
              ),
              (
                  '+ `${escapeHTML(team.label)}</option>`'
              ),
              "escapeHTML(team.label)",
              "Best tournaments option label",
          )


          # Remove the implementation version from the public About page.
          methodology_about = (
              "Methodology: "
              "${escapeHTML(summary.meta.methodology_version)}<br>"
          )
          app = app.replace(methodology_about, "", 1)
          if methodology_about in app:
              raise RuntimeError(
                  "The About-page methodology version remains."
              )

          app = replace_once_or_present(
              app,
              (
                  "Current rankings, historical rankings, nation peaks "
                  "and matchup records all use the same "
                  "evidence-adjusted NFELO rating."
              ),
              (
                  "Current and historical rankings, tournament "
                  "snapshots, nation peaks and every record table all "
                  "use the same evidence-adjusted NFELO rating."
              ),
              (
                  "Current and historical rankings, tournament "
                  "snapshots, nation peaks and every record table"
              ),
              "About-page one-rating description",
          )


          # Add one FAQ item covering the tournament archive and records.
          faq_question = (
              "What do the Tournaments and Best tournaments pages show?"
          )
          if faq_question not in app:
              faq_anchor = (
                  '  {\n'
                  '    question: "How often is the site updated?",\n'
              )
              faq_item = (
                  '  {\n'
                  '    question: "What do the Tournaments and Best '
                  'tournaments pages show?",\n'
                  '    answer: "The Tournaments page compares every '
                  'participant immediately before or after a completed '
                  'edition, using positions in the full world ranking and '
                  'rating movement from that edition’s own matchdays. Best '
                  'tournaments ranks the 500 largest positive tournament '
                  'rating gains. Its team filter groups successor histories '
                  'under the current canonical name and notes historical '
                  'tournament names such as West Germany or the Soviet '
                  'Union."\n'
                  '  },\n'
              )
              if app.count(faq_anchor) != 1:
                  raise RuntimeError(
                      "Could not locate the FAQ insertion point."
                  )
              app = app.replace(
                  faq_anchor,
                  faq_item + faq_anchor,
                  1,
              )


          # Read the deployed methodology version from the existing
          # regression contract rather than duplicating it in the workflow.
          version_match = re.search(
              r'meta\["methodology_version"\],\s*'
              r'"(?P<version>[^"]+)"',
              tests,
              flags=re.MULTILINE,
          )
          if not version_match:
              raise RuntimeError(
                  "Could not read the deployed methodology version "
                  "from tests/test_build.py."
              )
          methodology_version = version_match.group("version")


          old_readme_intro = '''[NFELO](https://nfelo.github.io/) is a static, searchable rating and prediction
          site for senior men's international football. It covers results from 1872 to
          the present, current and historical rankings, every source match, one peak per
          nation, top match instances, number-one chronology, team comparison and a
          date-aware probability calculator.'''
          new_readme_intro = '''[NFELO](https://nfelo.github.io/) is a static, searchable rating and prediction
          site for senior men's international football. It covers results from 1872 to
          the present, current and historical rankings, tournament snapshots, every
          source match, nation peaks, number-one chronology and totals, top match
          instances, largest upsets, Best tournaments, team comparison and a date-aware
          probability calculator.'''
          readme = replace_once_or_present(
              readme,
              old_readme_intro,
              new_readme_intro,
              "tournament snapshots",
              "README feature introduction",
          )


          version_line = (
              "**Current methodology version:** "
              f"`{methodology_version}`."
          )
          version_pattern = re.compile(
              r'^\*\*Current methodology version:\*\* `[^`]+`\.$',
              flags=re.MULTILINE,
          )
          if version_pattern.search(readme):
              readme = version_pattern.sub(
                  version_line,
                  readme,
                  count=1,
              )
          else:
              readme_anchor = (
                  "gained from results.\n\n"
              )
              readme_addition = (
                  "gained from results.\n\n"
                  f"{version_line}\n\n"
                  "Tournament snapshots use the same published rating "
                  "immediately before and after each completed edition. "
                  "Tournament rating change and Best tournaments include "
                  "only published movement from that edition's matchdays, "
                  "excluding annual recalibration and unrelated results. "
                  "Successor lineages are grouped under the current "
                  "canonical name while historical tournament names remain "
                  "visible as aliases.\n\n"
              )
              if readme.count(readme_anchor) != 1:
                  raise RuntimeError(
                      "Could not locate the README methodology insertion "
                      "point."
                  )
              readme = readme.replace(
                  readme_anchor,
                  readme_addition,
                  1,
              )


          # Update existing FAQ count and add focused regression coverage.
          tests, count_replacements = re.subn(
              r"(self\.assertEqual\(javascript\.count"
              r"\('question: \"'\), )\d+(\))",
              r"\g<1>30\2",
              tests,
              count=1,
          )
          if count_replacements != 1:
              raise RuntimeError(
                  "Could not update the FAQ item-count assertion."
              )

          faq_assertion = (
              '        self.assertIn(\n'
              '            "What do the Tournaments and Best tournaments '
              'pages show?",\n'
              '            javascript,\n'
              '        )\n'
          )
          if faq_assertion not in tests:
              faq_count_line = (
                  "        self.assertEqual("
                  "javascript.count('question: \"'), 30)\n"
              )
              if tests.count(faq_count_line) != 1:
                  raise RuntimeError(
                      "Could not locate the updated FAQ count assertion."
                  )
              tests = tests.replace(
                  faq_count_line,
                  faq_count_line + faq_assertion,
                  1,
              )


          test_name = (
              "def test_records_lineage_labels_and_repository_version"
          )
          if test_name not in tests:
              insertion_marker = (
                  "    def test_public_metadata_and_discovery_files"
                  "(self) -> None:\n"
              )
              new_test = r'''    def test_records_lineage_labels_and_repository_version(self) -> None:
                  javascript = (
                      ROOT / "public" / "assets" / "app.js"
                  ).read_text(encoding="utf-8")
                  readme = (
                      ROOT / "README.md"
                  ).read_text(encoding="utf-8")

                  for phrase in (
                      "Explore nation peaks, No. 1 chronology and totals",
                      "const bestTournamentCurrentNames = new Map(",
                      "const bestTournamentAliases = new Map();",
                      "label: displayAliases.length",
                      "escapeHTML(team.label)",
                      "What do the Tournaments and Best tournaments pages show?",
                      "Current and historical rankings, tournament snapshots",
                  ):
                      self.assertIn(phrase, javascript)

                  self.assertNotIn(
                      "Methodology: "
                      "${escapeHTML(summary.meta.methodology_version)}",
                      javascript,
                  )
                  self.assertIn(
                      "**Current methodology version:**",
                      readme,
                  )
                  self.assertIn(
                      self.summary["meta"]["methodology_version"],
                      readme,
                  )
                  self.assertIn(
                      "Tournament snapshots use the same published rating",
                      readme,
                  )

          '''
              if tests.count(insertion_marker) != 1:
                  raise RuntimeError(
                      "Could not locate the test insertion point."
                  )
              tests = tests.replace(
                  insertion_marker,
                  new_test + insertion_marker,
                  1,
              )


          required_app = [
              new_records_lede,
              lineage_marker,
              "const bestTournamentAliases = new Map();",
              "label: displayAliases.length",
              "escapeHTML(team.label)",
              faq_question,
              (
                  "Current and historical rankings, tournament "
                  "snapshots, nation peaks and every record table"
              ),
          ]
          missing_app = [
              marker
              for marker in required_app
              if marker not in app
          ]
          if missing_app:
              raise RuntimeError(
                  "App validation failed; missing: "
                  + ", ".join(missing_app)
              )

          if methodology_about in app:
              raise RuntimeError(
                  "About page still exposes the methodology version."
              )

          if version_line not in readme:
              raise RuntimeError(
                  "README does not contain the current methodology "
                  "version."
              )

          if "Tournament snapshots use the same published rating" not in readme:
              raise RuntimeError(
                  "README tournament documentation was not installed."
              )


          APP_PATH.write_text(
              app.rstrip() + "\n",
              encoding="utf-8",
          )
          README_PATH.write_text(
              readme.rstrip() + "\n",
              encoding="utf-8",
          )
          TEST_PATH.write_text(
              tests.rstrip() + "\n",
              encoding="utf-8",
          )

          print(
              "Updated Records copy, successor-lineage labels, About, "
              "FAQ, README and regression tests."
          )
          PY

      - name: Validate source syntax
        run: |
          set -euo pipefail
          python -m py_compile scripts/build_site.py tests/test_build.py
          node --check public/assets/app.js

      - name: Build static site
        run: |
          set -euo pipefail
          python scripts/build_site.py \
            --source source \
            --config config \
            --output public

      - name: Audit generated site and documentation
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY'
          from collections import defaultdict
          import json
          from pathlib import Path


          javascript = Path(
              "public/assets/app.js"
          ).read_text(encoding="utf-8")
          readme = Path("README.md").read_text(encoding="utf-8")
          summary = json.loads(
              Path("public/data/summary.json").read_text(
                  encoding="utf-8"
              )
          )

          required = [
              "Explore nation peaks, No. 1 chronology and totals",
              "const bestTournamentCurrentNames = new Map(",
              "const bestTournamentAliases = new Map();",
              "escapeHTML(team.label)",
              "What do the Tournaments and Best tournaments pages show?",
              (
                  "Current and historical rankings, tournament "
                  "snapshots, nation peaks and every record table"
              ),
          ]
          missing = [
              marker
              for marker in required
              if marker not in javascript
          ]
          assert not missing, missing

          assert (
              "Methodology: "
              "${escapeHTML(summary.meta.methodology_version)}"
              not in javascript
          )
          assert (
              summary["meta"]["methodology_version"]
              in readme
          )
          assert (
              "Tournament snapshots use the same published rating"
              in readme
          )
          assert javascript.count('question: "') == 30

          current_names = {
              team["code"]: team["nation"]
              for team in summary["teams"]
          }
          aliases: dict[str, set[str]] = defaultdict(set)
          for row in summary.get("best_tournaments", []):
              current = current_names.get(row["code"])
              if row.get("nation") and row["nation"] != current:
                  aliases[row["code"]].add(row["nation"])

          assert aliases, "No historical tournament aliases were found."

          if "RU" in {
              row["code"]
              for row in summary.get("best_tournaments", [])
          }:
              assert current_names["RU"] == "Russia"
              assert aliases["RU"]
              assert any(
                  name in {"Soviet Union", "USSR"}
                  for name in aliases["RU"]
              )

          if "DE" in {
              row["code"]
              for row in summary.get("best_tournaments", [])
          }:
              assert current_names["DE"] == "Germany"
              assert "West Germany" in aliases["DE"]

          print(
              "Audited all Records categories, canonical lineage "
              "labels, FAQ coverage, About copy and README version."
          )
          PY

      - name: Run complete verification
        run: |
          set -euo pipefail
          python -m unittest discover \
            --start-directory tests \
            --verbose
          node --check public/assets/app.js

      - name: Preserve source assets and discard generated output
        shell: bash
        run: |
          set -euo pipefail

          cp public/assets/app.js /tmp/nfelo-records-docs-app.js
          git restore --worktree -- public
          git clean -fd -- public
          cp /tmp/nfelo-records-docs-app.js public/assets/app.js

      - name: Check final patch
        shell: bash
        run: |
          set -euo pipefail

          node --check public/assets/app.js
          python -m py_compile tests/test_build.py
          git diff --check

          changed="$(git diff --name-only)"
          expected="$(
            printf '%s\n' \
              README.md \
              public/assets/app.js \
              tests/test_build.py
          )"
          if [ "$changed" != "$expected" ]; then
            echo "Unexpected changed files:"
            printf '%s\n' "$changed"
            exit 1
          fi

          grep -F \
            'const bestTournamentCurrentNames = new Map(' \
            public/assets/app.js
          grep -F \
            '**Current methodology version:**' \
            README.md
          grep -F \
            'What do the Tournaments and Best tournaments pages show?' \
            public/assets/app.js

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- \
            README.md \
            public/assets/app.js \
            tests/test_build.py
          then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Records and documentation are already reconciled."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            public/assets/app.js \
            tests/test_build.py

          git commit -m "Reconcile Records names and documentation"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Confirm automatic Pages trigger
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "The push to main automatically triggers pages.yml."
          echo "No duplicate workflow_dispatch is sent."
