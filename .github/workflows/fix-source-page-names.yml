name: Fix source page names

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install corrected source updater
        env:
          FILE_ARCHIVE: 
        run: |
          printf '%s' "$FILE_ARCHIVE" | base64 --decode | xz --decompress > /tmp/fetch_sources.py
          cp /tmp/fetch_sources.py scripts/fetch_sources.py
          python -m py_compile scripts/fetch_sources.py
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/fetch_sources.py
          git commit -m "Fix World team page name resolution"
          git push
